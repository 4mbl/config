name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Create release PR or publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # for creating release PR
      pull-requests: write # for creating release PR
      id-token: write # for publishing to npm registry
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Run changesets
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: pnpm run publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  alpha:
    needs: release
    if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    name: Publish alphas
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write # for publishing to npm registry
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Publish to npm
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          ALPHA_VERSION="0.0.0-alpha.$SHORT_SHA"
          echo "Publishing workspace packages as alpha: $ALPHA_VERSION"
          pnpm -r exec npm version "$ALPHA_VERSION" --no-git-tag-version
          pnpm -r publish --tag alpha --access public --no-git-checks
