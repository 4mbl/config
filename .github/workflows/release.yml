name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Create release PR or publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # for creating release PR
      pull-requests: write # for creating release PR
      id-token: write # for publishing to npm registry
    steps:
      - name: Checkout Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: package.json
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Run changesets
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: pnpm run publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  alpha:
    needs: release
    if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    name: Publish alphas
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write # for publishing to npm registry
    steps:
      - name: Checkout Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: package.json
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Publish to npm
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          ALPHA_VERSION="0.0.0-alpha.$SHORT_SHA"
          echo "Publishing workspace packages as alpha: $ALPHA_VERSION"
          pnpm -r exec npm version "$ALPHA_VERSION" --no-git-tag-version
          pnpm -r publish --tag alpha --access public --no-git-checks
